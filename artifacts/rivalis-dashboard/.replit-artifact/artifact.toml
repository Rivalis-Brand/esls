kind = "web"
previewPath = "/rivalis-dashboard/"
title = "Rivalis Dashboard"
version = "1.0.0"
id = "artifacts/rivalis-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/rivalis-dashboard/" ]
localPort = 22226

[services.development]
run = "pnpm --filter @workspace/rivalis-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rivalis-dashboard", "run", "build" ]
publicDir = "artifacts/rivalis-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22226"
BASE_PATH = "/rivalis-dashboard/"
