kind = "web"
previewPath = "/tnt-website/"
title = "Top Notch Turf"
version = "1.0.0"
id = "artifacts/tnt-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/tnt-website/" ]
localPort = 19982

[services.development]
run = "pnpm --filter @workspace/tnt-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tnt-website", "run", "build" ]
publicDir = "artifacts/tnt-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19982"
BASE_PATH = "/tnt-website/"
