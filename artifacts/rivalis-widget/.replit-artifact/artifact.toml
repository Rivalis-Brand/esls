kind = "web"
previewPath = "/rivalis-widget/"
title = "Rivalis Widget"
version = "1.0.0"
id = "artifacts/rivalis-widget"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/rivalis-widget/" ]
localPort = 25552

[services.development]
run = "pnpm --filter @workspace/rivalis-widget run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rivalis-widget", "run", "build" ]
publicDir = "artifacts/rivalis-widget/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25552"
BASE_PATH = "/rivalis-widget/"
